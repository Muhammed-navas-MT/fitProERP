name: Production CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Backend
      - name: Setup Node for Backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend
        run: cd backend && npm ci

      - name: Build Backend
        run: cd backend && npm run build

      # Frontend
      - name: Setup Node for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/pitpro/package-lock.json

      - name: Install Frontend
        run: cd frontend/pitpro && npm ci

      - name: Build Frontend
        run: cd frontend/pitpro && npm run build

      # DockerHub Login
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build Backend Docker Image
      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fitpro-backend:latest ./backend

      # Push Backend Docker Image
      - name: Push Backend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fitpro-backend:latest

      # Deploy to EC2
      - name: Deploy Backend to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/fitpro-backend:latest

            docker stop fitpro-backend || true
            docker rm fitpro-backend || true

            docker run -d \
              --env-file ~/fitpro/backend/.env \
              -p 3000:3000 \
              --name fitpro-backend \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/fitpro-backend:latest
